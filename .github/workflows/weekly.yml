name: Weekly Actor News

on:
  schedule:
    - cron: "0 9 * * 1"   # Her Pazartesi 09:00 UTC (12:00 TR)
  workflow_dispatch:

jobs:
  fetch-news:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run RSS script
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python scripts/weekly_rss.py
